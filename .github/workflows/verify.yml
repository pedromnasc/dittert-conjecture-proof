name: Exact verification

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements-audit.txt

      - name: Install audit dependencies
        run: python -m pip install --disable-pip-version-check -r requirements-audit.txt

      - name: Verify n=4 bundle integrity
        working-directory: n4
        run: sha256sum -c SHA256SUMS

      - name: Verify n=4 certificate
        working-directory: n4
        run: |
          python verify_primary.py
          python verify_literal_square_numpy.py
          python verify_literal_square_stdlib.py

      - name: Ensure optimized mode is rejected
        working-directory: n4
        run: |
          if python -O verify_primary.py; then exit 1; fi
          if python -O verify_literal_square_numpy.py; then exit 1; fi
          if python -O verify_literal_square_stdlib.py; then exit 1; fi

      - name: Verify n=5 bundle integrity
        working-directory: n5
        run: sha256sum -c SHA256SUMS

      - name: Verify n=5 certificate
        working-directory: n5
        run: |
          python verify_primary.py
          python test_alternate_certificate.py
          python test_rejects_corrupt_certificate.py

      - name: Ensure n=5 optimized mode is rejected
        working-directory: n5
        run: if python -O verify_primary.py; then exit 1; fi

      - name: Verify n=9 package integrity
        working-directory: n9
        run: sha256sum -c SHA256SUMS

      - name: Verify and test n=9 proof calculations
        working-directory: n9
        run: |
          python -I verify_dittert_n9.py
          python -I audit_dittert_n9_stdlib.py
          python -I test_n9_package.py

      - name: Verify n=10 package integrity
        working-directory: n10
        run: sha256sum -c SHA256SUMS

      - name: Verify and test n=10 proof calculations
        working-directory: n10
        run: |
          python -I verify_dittert_n10.py
          python -I audit_dittert_n10_stdlib.py
          python -I test_n10_package.py

      - name: Verify n=11,12,13 bundle integrity
        working-directory: n11-n13
        run: sha256sum -c CHECKSUMS.sha256

      - name: Verify n=11,12,13 proof calculations
        working-directory: n11-n13
        run: |
          python -I verify_dittert_n11_n13.py
          python -I audit_dittert_n11_n13_sympy.py

      - name: Verify n=14,15,16 bundle integrity
        working-directory: n14-n16
        run: sha256sum -c MANIFEST.sha256

      - name: Verify n=14,15,16 proof calculations
        working-directory: n14-n16
        run: |
          python verify_dittert_n14_n16.py
          python audit_dittert_n14_n16_sympy.py
